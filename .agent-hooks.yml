# ~/.agent-hooks.yml — committed baseline, shared across machines.
#
# Central registry of agent hooks run by hooks-runner across all harnesses.
# Machine-specific or private hooks go in ~/.agent-hooks.local.yml (same shape,
# gitignored), overlaid by hook name.
#
# Merge semantics (by name):
#   - Local entry with a new name: adds the hook
#   - Local entry with an existing name: replaces the base entry wholesale
#   - Local entry with enabled: false: disables the base hook on this machine
#
# Entry fields:
#   name       unique id (merge key)
#   on         canonical events: session_start, prompt_submit, turn_end,
#              session_end, notification, tool_pre
#   command    executable run with the CanonicalEvent envelope on stdin
#   harness    optional allowlist: [claude], [cursor], or both (default: all)
#   enabled    optional; false disables the hook
#   decision   optional; true = this hook's stdout is a canonical decision
#              ({"decision":"block"|"allow","reason","context"}). hooks-runner
#              picks the first block (registry order) and translates it into the
#              invoking harness's native deny/block contract. Observers omit this
#              and stay on the neutral exit-0 path. Note: a turn_end block is
#              Claude-only — Cursor's stop hook is observe-only and cannot block.

hooks:
  - name: session-track
    on: [session_start, prompt_submit]
    command: claude-hook-session-track
    harness: [claude]
  - name: cursor-session-track
    on: [session_start, prompt_submit]
    command: cursor-hook-session-track
    harness: [cursor]
  - name: session-end
    on: [session_end]
    command: claude-hook-session-end
    harness: [claude]
  - name: cursor-session-end
    on: [session_end]
    command: cursor-hook-session-end
    harness: [cursor]
  - name: notify
    on: [turn_end, notification]
    command: claude-hook-notify
    harness: [claude]
  - name: checks-snapshot
    on: [turn_end]
    command: checks-snapshot
    harness: [claude, cursor]
  - name: session-log
    on: [turn_end, SubagentStart, SubagentStop]
    command: claude-hook-session-log
    harness: [claude, cursor]
  - name: engineering-autocommit
    on: [turn_end]
    command: engineering-autocommit
    harness: [claude, cursor]
  # Decision hook: deny raw git writes in GitButler repos, cross-harness.
  # Claude PreToolUse(Bash) and Cursor beforeShellExecution both map to tool_pre.
  - name: gitbutler-git
    on: [tool_pre]
    command: claude-hook-gitbutler-git
    harness: [claude, cursor]
    decision: true
